# Build (and optionally sign) Windows release binaries.
# Signing: SignPath Foundation (recommended) or Azure Artifact Signing.
# See docs/CODE_SIGNING.md

name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: windows-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CODESIGNING_ENDPOINT: ${{ secrets.AZURE_CODESIGNING_ENDPOINT }}
      AZURE_CODESIGNING_ACCOUNT: ${{ secrets.AZURE_CODESIGNING_ACCOUNT }}
      AZURE_CODESIGNING_PROFILE: ${{ secrets.AZURE_CODESIGNING_PROFILE }}
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure CMake
        run: cmake --preset default

      - name: Build RelWithDebInfo
        run: cmake --build msvc-build/default --config RelWithDebInfo

      - name: Install to msvc-out
        run: cmake --install msvc-build/default --config RelWithDebInfo

      - name: Azure login (optional signing)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Sign with Azure Artifact Signing (optional)
        if: env.AZURE_CODESIGNING_ENDPOINT != ''
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.AZURE_CODESIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_CODESIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_CODESIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}/msvc-out/relwithdebinfo
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload unsigned binaries for SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: sf4e-unsigned-binaries
          path: msvc-out/relwithdebinfo/
          archive: false

      - name: Sign with SignPath Foundation
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: msvc-out/relwithdebinfo
          skip-decompress: true

      - name: Verify Authenticode signatures
        if: env.SIGNPATH_API_TOKEN != '' || env.AZURE_CODESIGNING_ENDPOINT != ''
        shell: pwsh
        run: |
          $files = @('Launcher.exe','Sidecar.dll','RelayHost.exe','Updater.exe')
          foreach ($f in $files) {
            $p = Join-Path 'msvc-out/relwithdebinfo' $f
            if (-not (Test-Path $p)) { continue }
            $sig = Get-AuthenticodeSignature $p
            if ($sig.Status -ne 'Valid') {
              Write-Error "Expected Valid signature on $f, got $($sig.Status)"
            }
            Write-Host "OK: $f -> $($sig.SignerCertificate.Subject)"
          }

      - name: Package team zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v') { $label = $tag.Substring(1) } else { $label = "ci" }
          . ./scripts/package-team.ps1 -VersionLabel $label

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sf4-netplay-windows
          path: |
            msvc-out/relwithdebinfo/Launcher.exe
            msvc-out/relwithdebinfo/Sidecar.dll
            msvc-out/relwithdebinfo/RelayHost.exe
            dist/*.zip
